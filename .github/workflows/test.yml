name: Backend Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest requests urllib3

      - name: Start Backend Server
        run: |
          cd backend
          # Run the server in the background and pipe output to a log file
          python run.py > server.log 2>&1 &
          
          # Wait for the server to start (timeout after 15 seconds)
          timeout 15 bash -c 'until curl -s http://127.0.0.1:5000 > /dev/null; do sleep 1; done' || true
          
          # Print the server logs to help debug if it crashed
          cat server.log

      - name: Run Tests
        run: |
          cd backend/tests
          pytest -v