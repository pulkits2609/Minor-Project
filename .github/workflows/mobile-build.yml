name: Build Mobile APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'mobile/**'
  workflow_dispatch:

permissions:
  contents: write # Required for creating the Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20 # Upgraded to 20 for better Expo compatibility

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install dependencies
      run: |
        cd mobile
        npm install

    - name: Install EAS CLI
      run: npm install -g eas-cli

    - name: Generate version
      run: echo "VERSION=$(git rev-list --count HEAD)" >> $GITHUB_ENV

    - name: Update app metadata
      run: |
        cd mobile
        # Use jq to update version and android.versionCode
        jq ".expo.version = \"1.0.${{ env.VERSION }}\" | .expo.android.versionCode = ${{ env.VERSION }}" app.json > tmp.json && mv tmp.json app.json
        jq ".version = \"1.0.${{ env.VERSION }}\"" package.json > tmp.json && mv tmp.json package.json
        echo "Updated app.json and package.json to version 1.0.${{ env.VERSION }}"

    - name: Build APK (Local)
      run: |
        mkdir -p output
        cd mobile
        # --local tells EAS to build on this machine, skipping the Expo queue
        eas build --platform android --profile production --local --non-interactive --output=../output/app.apk
      env:
        EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        NODE_OPTIONS: "--max-old-space-size=4096" # Help prevent OOM crashes


    - name: Rename APK
      run: mv output/app.apk output/mineops-v${{ env.VERSION }}.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}
        name: Mine Ops v${{ env.VERSION }}
        files: output/mineops-v${{ env.VERSION }}.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
